<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🌡 Temperature Converter</h1>
        <p class="subtitle">Convert temperatures instantly</p>

        <div class="input-group">
            <label for="temperature">Enter Temperature</label>
            <input type="text" id="temperature" placeholder="Enter value">
        </div>

        <div class="input-group">
            <label for="fromUnit">Convert From</label>
            <select id="fromUnit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="toUnit">Convert To</label>
            <select id="toUnit">
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="celsius">Celsius (°C)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <button id="convertBtn">Convert</button>

        <div class="result-box" id="result">
            Converted temperature will appear here.
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
